# Cloud Build trigger config for enterprise-gemma2.
# Trigger this file on pushes to main.

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: gemma-assistant-api
  _AR_REPOSITORY: enterprise-gemma2
  _IMAGE_NAME: gemma-assistant-api
  _PROJECT_NUMBER: "$PROJECT_NUMBER"
  _MODEL_REGION: us-east1
  _ENDPOINT_ID: mg-endpoint-938bfbf2-2bc1-4937-a058-900bc5f31758
  _DEDICATED_DNS: mg-endpoint-938bfbf2-2bc1-4937-a058-900bc5f31758.us-east1-702117088368.prediction.vertexai.goog
  _PACKAGE_BUCKET: gemma_think
  _SERVICE_ACCOUNT_EMAIL: "${_PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
  _GOOGLE_MAPS_SECRET: GOOGLE_MAPS_API_KEY:latest
  _VERTEX_IMAGE_REGION: us-central1
  _VERTEX_IMAGE_MODEL: imagen-4.0-generate-001
  _AUTH_PROVIDER: iap
  _ALLOWED_EMAIL_DOMAIN: workzoneos.org
  _CPU: "2"
  _MEMORY: 4Gi
  _TIMEOUT: "900"
  _MAX_INSTANCES: "10"
  _MIN_INSTANCES: "0"
  _IMAGE_URI: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: compile-python
    name: python:3.11-slim
    entrypoint: python
    args:
      - -m
      - py_compile
      - main.py

  - id: ensure-artifact-registry
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud artifacts repositories describe "${_AR_REPOSITORY}" \
          --location="${_REGION}" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "${_AR_REPOSITORY}" \
          --repository-format=docker \
          --location="${_REGION}" \
          --description="Docker images for ${_SERVICE_NAME}"

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_IMAGE_URI}
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE_URI}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_URI}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --service-account=${_SERVICE_ACCOUNT_EMAIL}
      - --cpu=${_CPU}
      - --memory=${_MEMORY}
      - --timeout=${_TIMEOUT}
      - --max-instances=${_MAX_INSTANCES}
      - --min-instances=${_MIN_INSTANCES}
      - --cpu-throttling
      - --set-env-vars=VERTEX_ENDPOINT_URL=https://${_DEDICATED_DNS}/v1/projects/${_PROJECT_NUMBER}/locations/${_MODEL_REGION}/endpoints/${_ENDPOINT_ID}:rawPredict,PACKAGE_BUCKET=${_PACKAGE_BUCKET},SERVICE_ACCOUNT_EMAIL=${_SERVICE_ACCOUNT_EMAIL},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_IMAGE_REGION=${_VERTEX_IMAGE_REGION},VERTEX_IMAGE_MODEL=${_VERTEX_IMAGE_MODEL},AUTH_PROVIDER=${_AUTH_PROVIDER},ALLOWED_EMAIL_DOMAIN=${_ALLOWED_EMAIL_DOMAIN}
      - --set-secrets=GOOGLE_MAPS_API_KEY=${_GOOGLE_MAPS_SECRET}

images:
  - ${_IMAGE_URI}

